<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>🌌 Portalscape Game — Movie Worlds Adventure</title>
    <meta name="description" content="A-Frame Portalscape Game — Explore Different Movie Worlds">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Assets -->
      <a-assets>
        <img id="space-sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/space.jpg">
        <img id="cyber-sky" src="https://images.unsplash.com/photo-1579546069362-bda4aeb12248?w=2000">
        <img id="fantasy-sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg">
        <img id="scifi-sky" src="https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=2000">
        <img id="stone-floor" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        <canvas id="portal-canvas"></canvas>
      </a-assets>

      <!-- Ambient + World Lights -->
      <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
      <a-light type="directional" color="#FFF" intensity="1" position="5 3 5"></a-light>

      <!-- Camera + Controls (Desktop & VR) -->
      <a-entity id="rig">
        <a-entity camera position="0 1.6 0" look-controls wasd-controls>
          <a-cursor
            color="#00FF88"
            fuse="true"
            fuse-timeout="3000"
            raycaster="objects: .portal, .back-button, #hub-help; far: 30">
          </a-cursor>
        </a-entity>

        <!-- VR Controllers -->
        <a-entity
          id="leftController"
          meta-touch-controls="hand: left"
          laser-controls="hand: left"
          raycaster="objects: .portal, .back-button, #hub-help; far: 30"
          line="color: cyan">
        </a-entity>
        <a-entity
          id="rightController"
          meta-touch-controls="hand: right"
          laser-controls="hand: right"
          raycaster="objects: .portal, .back-button, #hub-help; far: 30"
          line="color: magenta">
        </a-entity>
      </a-entity>

      <!-- ============ HUB WORLD ============ -->
      <a-entity id="hub-world">
        <!-- Enhanced Hub Floor with Gradient -->
        <a-plane
          id="hub-floor"
          position="0 0 0"
          rotation="-90 0 0"
          width="50"
          height="50"
          color="#0a0a15">
        </a-plane>

        <!-- Decorative floor circles -->
        <a-cylinder position="0 0.01 0" radius="12" height="0.02" color="#1a3a4a" opacity="0.6"></a-cylinder>
        <a-cylinder position="0 0.02 0" radius="8" height="0.02" color="#2a4a6a" opacity="0.4"></a-cylinder>

        <!-- Hub Sky with gradient effect -->
        <a-sky id="hub-sky" color="#0d1b2a"></a-sky>

        <!-- Enhanced Ambient Lighting -->
        <a-light type="ambient" color="#00FF88" intensity="0.5"></a-light>
        <a-light type="directional" color="#00FF88" intensity="0.8" position="5 10 5"></a-light>
        <a-light type="point" color="#00FF88" intensity="0.6" position="0 5 0"></a-light>

        <!-- Main Title with Enhanced Animation -->
        <a-text
          value="🌌 PORTALSCAPE 🌌"
          position="0 4.5 -8"
          align="center"
          color="#00FF88"
          font="mozillavr"
          width="10"
          scale="1.8 1.8 1.8">
          <a-animation attribute="position" to="0 5 -8" dir="alternate" dur="2500" repeat="indefinite"></a-animation>
          <a-animation attribute="scale" to="1.9 1.9 1.9" dir="alternate" dur="2500" repeat="indefinite"></a-animation>
        </a-text>

        <!-- Glow effect behind title -->
        <a-sphere position="0 4.7 -8.5" radius="3" color="#00FF88" opacity="0.1" material="emissive: #00FF88"></a-sphere>

        <!-- Subtitle Text -->
        <a-text
          value="EXPLORE INFINITE WORLDS BEYOND THE PORTALS"
          position="0 3 -8"
          align="center"
          color="#FFD700"
          font="mozillavr"
          width="8"
          scale="0.9 0.9 0.9">
          <a-animation attribute="opacity" to="1" from="0.6" dur="2000" dir="alternate" repeat="indefinite"></a-animation>
        </a-text>

        <!-- Instructions -->
        <a-text
          value="[CLICK ANY PORTAL TO ENTER • 8 WORLDS AWAIT]"
          position="0 2 -8"
          align="center"
          color="#64FF00"
          font="mozillavr"
          width="7"
          scale="0.65 0.65 0.65">
        </a-text>

        <!-- Decorative top bar -->
        <a-box position="0 5.5 -8" width="20" height="0.3" depth="0.3" color="#00FF88" emissive="#00FF88" opacity="0.8"></a-box>

        <!-- Row 1: First 4 Portals (Front row) -->
        <!-- Portal 1: Sci-Fi World (Blue Glow) -->
        <a-cylinder
          id="portal-scifi"
          class="portal"
          position="-6 1.5 -4"
          radius="1.1"
          height="0.2"
          color="#1E90FF"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#1E90FF" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#00FFFF"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#1E90FF" opacity="0.2" material="emissive: #1E90FF"></a-sphere>
        </a-cylinder>

        <a-text
          value="🤖 SCI-FI\nFUTURE STATION"
          position="-6 3.8 -4"
          align="center"
          color="#00FFFF"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="-6 0.8 -4" width="2.5" height="0.4" depth="0.3" color="#00FFFF" opacity="0.5" emissive="#0088FF"></a-box>

        <!-- Portal 2: Fantasy World (Purple Glow) -->
        <a-cylinder
          id="portal-fantasy"
          class="portal"
          position="-2 1.5 -4"
          radius="1.1"
          height="0.2"
          color="#9D4EDD"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#9D4EDD" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#E0AAFF"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#9D4EDD" opacity="0.2" material="emissive: #9D4EDD"></a-sphere>
        </a-cylinder>

        <a-text
          value="🧙 FANTASY\nKINGDOM"
          position="-2 3.8 -4"
          align="center"
          color="#E0AAFF"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="-2 0.8 -4" width="2.5" height="0.4" depth="0.3" color="#E0AAFF" opacity="0.5" emissive="#9D4EDD"></a-box>

        <!-- Portal 3: Action World (Red Glow) -->
        <a-cylinder
          id="portal-action"
          class="portal"
          position="2 1.5 -4"
          radius="1.1"
          height="0.2"
          color="#FF006E"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#FF006E" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#FFB703"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#FF006E" opacity="0.2" material="emissive: #FF006E"></a-sphere>
        </a-cylinder>

        <a-text
          value="💥 ACTION\nARENA"
          position="2 3.8 -4"
          align="center"
          color="#FFB703"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="2 0.8 -4" width="2.5" height="0.4" depth="0.3" color="#FFB703" opacity="0.5" emissive="#FF006E"></a-box>

        <!-- Portal 4: Underwater World (Cyan Glow) -->
        <a-cylinder
          id="portal-underwater"
          class="portal"
          position="6 1.5 -4"
          radius="1.1"
          height="0.2"
          color="#00D9FF"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#00D9FF" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#64DFDF"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#00D9FF" opacity="0.2" material="emissive: #00D9FF"></a-sphere>
        </a-cylinder>

        <a-text
          value="🌊 AQUATIC\nABYSS"
          position="6 3.8 -4"
          align="center"
          color="#64DFDF"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="6 0.8 -4" width="2.5" height="0.4" depth="0.3" color="#64DFDF" opacity="0.5" emissive="#00D9FF"></a-box>

        <!-- Row 2: Second 4 Portals (Back row) -->
        <!-- Portal 5: Cyberpunk World (Pink Glow) -->
        <a-cylinder
          id="portal-cyber"
          class="portal"
          position="-6 1.5 1"
          radius="1.1"
          height="0.2"
          color="#FF10F0"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#FF10F0" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#00FFF0"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#FF10F0" opacity="0.2" material="emissive: #FF10F0"></a-sphere>
        </a-cylinder>

        <a-text
          value="🏙️ CYBERPUNK\nCITY"
          position="-6 3.8 1"
          align="center"
          color="#00FFF0"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="-6 0.8 1" width="2.5" height="0.4" depth="0.3" color="#00FFF0" opacity="0.5" emissive="#FF10F0"></a-box>

        <!-- Portal 6: Minecraft World (Green Glow) -->
        <a-cylinder
          id="portal-minecraft"
          class="portal"
          position="-2 1.5 1"
          radius="1.1"
          height="0.2"
          color="#2CBF2C"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#2CBF2C" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#64FF00"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#2CBF2C" opacity="0.2" material="emissive: #2CBF2C"></a-sphere>
        </a-cylinder>

        <a-text
          value="🎮 MINECRAFT\nWORLD"
          position="-2 3.8 1"
          align="center"
          color="#64FF00"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="-2 0.8 1" width="2.5" height="0.4" depth="0.3" color="#64FF00" opacity="0.5" emissive="#2CBF2C"></a-box>

        <!-- Portal 7: Marvel Universe (Red/Gold Glow) -->
        <a-cylinder
          id="portal-marvel"
          class="portal"
          position="2 1.5 1"
          radius="1.1"
          height="0.2"
          color="#DD0000"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#DD0000" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#FFD700"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#DD0000" opacity="0.2" material="emissive: #DD0000"></a-sphere>
        </a-cylinder>

        <a-text
          value="🦸 MARVEL\nUNIVERSE"
          position="2 3.8 1"
          align="center"
          color="#FFD700"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="2 0.8 1" width="2.5" height="0.4" depth="0.3" color="#FFD700" opacity="0.5" emissive="#DD0000"></a-box>

        <!-- Portal 8: Game of Thrones World (Dark Purple/Red Glow) -->
        <a-cylinder
          id="portal-got"
          class="portal"
          position="6 1.5 1"
          radius="1.1"
          height="0.2"
          color="#4B0082"
          opacity="0.7">
          <a-animation attribute="rotation" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
          <a-light type="point" color="#4B0082" intensity="2.5" distance="20"></a-light>
          <!-- Portal Ring -->
          <a-torus
            radius="1.3"
            radius-tubular="0.12"
            color="#8B0000"
            opacity="0.95">
            <a-animation attribute="rotation" to="0 0 360" dur="3000" repeat="indefinite"></a-animation>
            <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
          </a-torus>
          <!-- Glow sphere -->
          <a-sphere position="0 0 0" radius="1.5" color="#4B0082" opacity="0.2" material="emissive: #4B0082"></a-sphere>
        </a-cylinder>

        <a-text
          value="🐉 GAME OF\nTHRONES"
          position="6 3.8 1"
          align="center"
          color="#8B0000"
          font="mozillavr"
          width="3"
          scale="0.75 0.75 0.75">
        </a-text>
        <a-box position="6 0.8 1" width="2.5" height="0.4" depth="0.3" color="#8B0000" opacity="0.5" emissive="#4B0082"></a-box>

        <!-- Floating particles for ambiance -->
        <a-sphere position="-8 3 -3" radius="0.15" color="#00FF88" opacity="0.6">
          <a-animation attribute="position" to="-8 4 -2" dur="3000" repeat="indefinite"></a-animation>
        </a-sphere>
        <a-sphere position="8 2.5 -2" radius="0.15" color="#00FF88" opacity="0.6">
          <a-animation attribute="position" to="8 3.5 -1" dur="3500" repeat="indefinite"></a-animation>
        </a-sphere>
        <a-sphere position="0 2 3" radius="0.15" color="#FFD700" opacity="0.6">
          <a-animation attribute="position" to="0 3 4" dur="4000" repeat="indefinite"></a-animation>
        </a-sphere>

        <!-- Bottom decorative line -->
        <a-box position="0 0.3 2" width="20" height="0.2" depth="0.2" color="#00FF88" emissive="#00FF88" opacity="0.6"></a-box>

        <!-- Floating world counter -->
        <a-text
          value="8 WORLDS • 360° EXPLORATION"
          position="0 -0.5 -8"
          align="center"
          color="#FFD700"
          font="mozillavr"
          width="6"
          scale="0.6 0.6 0.6">
        </a-text>

        <!-- Enhanced Help Button (Green info button at hub entry) -->
        <a-box id="hub-help" position="0 2.2 6.5" width="2.2" height="0.9" depth="0.4" color="#00FF88" emissive="#00FF88" metallic="1" roughness="0.1">
          <a-animation attribute="scale" to="1.1 1.1 1.1" dur="2000" dir="alternate" repeat="indefinite"></a-animation>
        </a-box>
        <a-light type="point" color="#00FF88" intensity="1.2" distance="12" position="0 2.2 6.5"></a-light>
        <a-text value="ℹ️ GUIDE" position="0 2.2 6.8" align="center" color="#000000" font="mozillavr" width="2" scale="0.7 0.7 0.7"></a-text>
        <a-text value="Click for Help" position="0 1.4 6.8" align="center" color="#00FF88" font="mozillavr" width="2" scale="0.5 0.5 0.5"></a-text>
      </a-entity>

      <!-- ============ SCI-FI WORLD ============ -->
      <a-entity id="scifi-world" visible="false">
        <a-plane
          position="0 0 0"
          rotation="-90 0 0"
          width="50"
          height="50"
          color="#0a1020">
        </a-plane>
        <a-sky color="#000814"></a-sky>
        <a-light type="point" color="#00FFFF" intensity="2" position="5 8 5"></a-light>
        <a-light type="point" color="#1E90FF" intensity="1.5" position="-5 6 -5"></a-light>
        <a-light type="ambient" color="#005f73" intensity="0.6"></a-light>

        <!-- Main Tower Structure -->
        <a-box position="0 1.5 -6" width="2" height="4" depth="2" color="#0073BB" metallic="1" roughness="0.2"></a-box>
        <a-box position="0 4.5 -6" width="2.3" height="0.5" depth="2.3" color="#1E90FF" metallic="1" roughness="0.2">
          <a-animation attribute="rotation" to="0 360 0" dur="6000" repeat="indefinite"></a-animation>
        </a-box>

        <!-- Sci-Fi Wings -->
        <a-box position="-5 1.5 -3" width="1.5" height="3" depth="2" color="#1E90FF" metallic="1" roughness="0.3"></a-box>
        <a-box position="5 1.5 -3" width="1.5" height="3" depth="2" color="#00FFFF" metallic="1" roughness="0.3"></a-box>
        <a-cylinder position="-5 3 -3" radius="0.5" height="2" color="#FFD700" metallic="1"></a-cylinder>
        <a-cylinder position="5 3 -3" radius="0.5" height="2" color="#FFD700" metallic="1"></a-cylinder>

        <!-- Floating Energy Spheres -->
        <a-sphere position="-3 3 0" radius="0.6" color="#FFD700" metallic="1" emissive="#FFD700">
          <a-animation attribute="position" to="-3 4.5 1" dur="2500" dir="alternate" repeat="indefinite"></a-animation>
        </a-sphere>
        <a-sphere position="3 3 0" radius="0.6" color="#FFD700" metallic="1" emissive="#FFD700">
          <a-animation attribute="position" to="3 4.5 1" dur="2500" dir="alternate" repeat="indefinite"></a-animation>
        </a-sphere>
        <a-sphere position="0 2 -3" radius="0.4" color="#00FFFF" emissive="#00FFFF">
          <a-animation attribute="scale" to="1.5 1.5 1.5" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
        </a-sphere>

        <!-- Sci-Fi Details -->
        <a-torus position="0 2 -2" radius="2" radius-tubular="0.1" color="#00FFFF" emissive="#00FFFF">
          <a-animation attribute="rotation" to="90 360 0" dur="5000" repeat="indefinite"></a-animation>
        </a-torus>

        <a-text value="🌐 FUTURE STATION" position="0 5 -8" align="center" color="#00FFFF" width="6" scale="1.3 1.3 1.3"></a-text>

        <!-- Back Button with Enhanced Styling -->
        <a-box id="back-scifi" class="back-button" position="0 1.5 5" width="2" height="1" depth="0.4" color="#FF006E" emissive="#FF006E" metallic="1" roughness="0.1">
          <a-animation attribute="scale" to="1.1 1.1 1.1" dur="1500" dir="alternate" repeat="indefinite"></a-animation>
        </a-box>
        <a-light type="point" color="#FF006E" intensity="1" distance="10" position="0 1.5 5"></a-light>
        <a-text value="← BACK TO HUB" position="0 1.5 5.3" align="center" color="#FFFFFF" width="3" scale="0.7 0.7 0.7" font="mozillavr"></a-text>
        <a-text value="[Click to Return]" position="0 0.7 5" align="center" color="#00FF88" width="2.5" scale="0.5 0.5 0.5"></a-text>
      </a-entity>

      <!-- ============ FANTASY WORLD ============ -->
      <a-entity id="fantasy-world" visible="false">
        <a-plane
          position="0 0 0"
          rotation="-90 0 0"
          width="50"
          height="50"
          color="#1a3a1a">
        </a-plane>
        <a-sky color="#664411"></a-sky>
        <a-light type="point" color="#FFD700" intensity="2" position="5 8 5"></a-light>
        <a-light type="point" color="#FF6B9D" intensity="1.5" position="-5 6 0"></a-light>
        <a-light type="ambient" color="#8B7355" intensity="0.7"></a-light>

        <!-- Grand Castle -->
        <!-- Center Keep -->
        <a-box position="0 1.5 -5" width="3" height="5" depth="3" color="#696969"></a-box>
        <!-- Castle Turrets -->
        <a-box position="-2.5 1.5 -5" width="1.5" height="4.5" depth="1.5" color="#505050"></a-box>
        <a-box position="2.5 1.5 -5" width="1.5" height="4.5" depth="1.5" color="#505050"></a-box>
        <a-box position="-2.5 4 -5" width="1.8" height="0.8" depth="1.8" color="#2F4F4F"></a-box>
        <a-box position="2.5 4 -5" width="1.8" height="0.8" depth="1.8" color="#2F4F4F"></a-box>
        <!-- Roof -->

        <!-- Iron Throne Chamber (Center) -->
        <a-box position="0 1 0" width="2" height="2" depth="2" color="#4B0082" emissive="#2a0052"></a-box>

    <script>
      // Portal Game Script
      const hubWorld = document.getElementById('hub-world');
      const scifiWorld = document.getElementById('scifi-world');
      const fantasyWorld = document.getElementById('fantasy-world');
      const actionWorld = document.getElementById('action-world');
      const underwaterWorld = document.getElementById('underwater-world');
      const cyberWorld = document.getElementById('cyber-world');
      const minecraftWorld = document.getElementById('minecraft-world');
      const marvelWorld = document.getElementById('marvel-world');
      const gotWorld = document.getElementById('got-world');

      const portals = {
        scifi: document.getElementById('portal-scifi'),
        fantasy: document.getElementById('portal-fantasy'),
        action: document.getElementById('portal-action'),
        underwater: document.getElementById('portal-underwater'),
        cyber: document.getElementById('portal-cyber'),
        minecraft: document.getElementById('portal-minecraft'),
        marvel: document.getElementById('portal-marvel'),
        got: document.getElementById('portal-got')
      };

      const worlds = {
        scifi: scifiWorld,
        fantasy: fantasyWorld,
        action: actionWorld,
        underwater: underwaterWorld,
        cyber: cyberWorld,
        minecraft: minecraftWorld,
        marvel: marvelWorld,
        got: gotWorld
      };

      let currentWorld = 'hub';

      const backButtons = {
        scifi: document.getElementById('back-scifi'),
        fantasy: document.getElementById('back-fantasy'),
        action: document.getElementById('back-action'),
        underwater: document.getElementById('back-underwater'),
        cyber: document.getElementById('back-cyber'),
        minecraft: document.getElementById('back-minecraft'),
        marvel: document.getElementById('back-marvel'),
        got: document.getElementById('back-got')
      };

      function switchWorld(worldName) {
        // Hide all worlds
        hubWorld.setAttribute('visible', false);
        Object.values(worlds).forEach(world => world.setAttribute('visible', false));

        // Show selected world
        if (worldName === 'hub') {
          hubWorld.setAttribute('visible', true);
        } else {
          worlds[worldName].setAttribute('visible', true);
        }

        // Create portal entry animation
        const camera = document.querySelector('[camera]');
        if (camera) {
          camera.setAttribute('animation', 
            'property: fov; from: 60; to: 80; dur: 500; dir: alternate; repeat: 1');
        }

        currentWorld = worldName;
      }

      // Portal click handlers
      Object.entries(portals).forEach(([world, portal]) => {
        portal.addEventListener('click', () => {
          console.log('Opening portal to: ' + world);
          switchWorld(world);
        });
      });

      // Back button handlers
      Object.entries(backButtons).forEach(([world, button]) => {
        button.addEventListener('click', () => {
          console.log('Returning to hub from: ' + world);
          switchWorld('hub');
        });
      });

      // Hub Help Button
      const hubHelp = document.getElementById('hub-help');
      if (hubHelp) {
        hubHelp.addEventListener('click', () => {
          alert('🌌 PORTALSCAPE GAME 🌌\n\nExplore 8 amazing worlds:\n\n🤖 Sci-Fi Future\n🧙 Fantasy Kingdom\n💥 Action Arena\n🌊 Aquatic Abyss\n🏙️ Cyberpunk City\n🎮 Minecraft World\n🦸 Marvel Universe\n🐉 Game of Thrones\n\nClick any portal to enter a world.\nClick the BACK button in each world to return.\n\nEnjoy your adventure!');
        });
      }

      console.log('🌌 Portalscape Game Loaded! Explore 8 amazing worlds: Sci-Fi, Fantasy, Action, Underwater, Cyberpunk, Minecraft, Marvel, and Game of Thrones!');
    </script>
